subject: Date
module: global
subjectType: class
mock:
  - __import__:./date-mock.js
constructor:
  terms:
    - params: []
      result: new Date("2020-01-01T00:00:00.000Z")
    - params: ['2020-01-01']
      result: new Date("2020-01-01T00:00:00.000Z")
    - params: ['2020-01-02']
      result: new Date("2020-01-02T00:00:00.000Z")
methods:
  toISOString:
    mockFunction: [CONSTRUCTOR]
    terms:
      - constructorParams: []
        params: []
        result: '2020-01-01T00:00:00.000Z'
      - constructorParams: ['2020-01-02']
        params: []
        result: '2020-01-02T00:00:00.000Z'
